<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="apple-touch-icon" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiqfwG2LUc8BVhvhhvNz-sjUEA_vQg8YW9PwOxFPgduC1smL6xvxvdMQA1s1WtW9iqtNq1JJ0ZKB9IoXBqWSeovIY4aPBKSZzEqJe_oZllao0kNyM81vLwLQpY-EsiMJqedQ66oIgIV8jP8/s400/money_kinbut_texta.png">
    
    <link rel="icon" type="image/png" sizes="192x192" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiqfwG2LUc8BVhvhhvNz-sjUEA_vQg8YW9PwOxFPgduC1smL6xvxvdMQA1s1WtW9iqtNq1JJ0ZKB9IoXBqWSeovIY4aPBKSZzEqJe_oZllao0kNyM81vLwLQpY-EsiMJqedQ66oIgIV8jP8/s400/money_kinbut_texta.png">
    
    <meta name="apple-mobile-web-app-title" content="消費券記錄小助手">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <title>消費獎賞助手</title>
    <style>
        :root { 
            --primary: #c0392b; --success: #2ecc71; --warning: #f39c12; --danger: #d63031; --bg: #f4f7f6; 
            --coupon-bg: #ffffff; --used-bg: #ececec; --dashed-color: #ddd;
            --base-size: 16px; 
        }
        
        html { font-size: var(--base-size); transition: font-size 0.2s ease; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; font-size: 1rem; line-height: 1.5; }
        
        header { background: var(--primary); color: white; padding: 15px 18px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 10px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 1.2rem; }
        .settings-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: white; }

        .container { padding: 12px; max-width: 600px; margin: 0 auto; padding-bottom: 50px; }

        .bank-logo { width: 1.8rem; height: 1.8rem; border-radius: 20%; background-color: #eee; object-fit: cover; flex-shrink: 0; display: block; }
        .bank-header-left { display: flex; align-items: center; gap: 10px; }

        .status-pill { padding: 3px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; white-space: nowrap; }
        .status-pill.pending { background: #fff4e6; color: var(--warning); border: 1px solid #ffe8cc; }
        .status-pill.done { background: #eafaf1; color: var(--success); border: 1px solid #d4f5e2; }

        .switch { position: relative; display: inline-block; width: 46px; height: 24px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e0e0e0; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(22px); }

        .coupon-wrapper { display: flex; align-items: stretch; background: var(--coupon-bg); border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.03); overflow: hidden; position: relative; }
        .check-box-zone { width: 55px; display: flex; align-items: center; justify-content: center; background: #fafafa; border-right: 1px solid #f0f0f0; cursor: pointer; flex-shrink: 0; }
        .check-circle { width: 24px; height: 24px; border: 2px solid #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; color: transparent; }
        .used .check-circle { background: var(--success); border-color: var(--success); color: white; }

        .dashed-line { position: absolute; right: 95px; top: 10px; bottom: 10px; border-left: 1px dashed var(--dashed-color); z-index: 5; }
        .coupon-info { flex: 1; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        .coupon-info h4 { margin: 0 0 4px 0; font-size: 1rem; font-weight: 600; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .coupon-info p { margin: 0; font-size: 0.8rem; color: #888; line-height: 1.4; }
        
        .coupon-amt-box { width: 95px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 8px; box-sizing: border-box; flex-shrink: 0; }
        .coupon-amt-box .currency { font-size: 0.7rem; font-weight: 600; color: #555; }
        .coupon-amt-box .amount { font-size: 1.8rem; font-weight: bold; line-height: 1; }

        .amt-10 .amount { color: #d63031; } .amt-20 .amount { color: #f39c12; } .amt-50 .amount { color: #2ecc71; } .amt-100 .amount { color: #3498db; } .amt-200 .amount { color: #9b59b6; }

        .btn-delete { color: #ccc; font-size: 1.1rem; position: absolute; top: 8px; right: 105px; z-index: 10; opacity: 0.3; padding: 5px; cursor: pointer; }
        .coupon-wrapper.used { background: var(--used-bg); }
        .coupon-wrapper.used .coupon-info h4, .coupon-wrapper.used .coupon-info p, .coupon-wrapper.used .coupon-amt-box * { color: #a0a0a0 !important; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 200; backdrop-filter: blur(4px); overflow-y: auto; }
        .modal-content { background: white; width: 92%; max-width: 420px; margin: 5% auto; padding: 25px; border-radius: 25px; box-sizing: border-box; }
        .bank-card { background: white; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); overflow: hidden; }
        .card-header { padding: 15px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #fcfcfc; }
        .btn-add { background: #fff; border: 1.5px dashed #e5e5e5; color: #888; width: 94%; padding: 12px; border-radius: 12px; margin: 5px 3% 15px 3%; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        
        .amount-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .amount-btn { padding: 12px 5px; border: 1.5px solid #eee; border-radius: 15px; background: white; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .amount-btn.active { border-color: var(--success); background: #eafaf1; color: var(--success); }

        .btn-save-fancy { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 1.1rem; margin-bottom: 12px; cursor: pointer; }
        .btn-reset-fancy { background: var(--danger); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
        
        .setting-section-title { font-size: 0.8rem; color: #95a5a6; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; margin-top: 15px; }
        
        .bank-option-fancy { padding: 12px 5px; border: 1px solid #eee; border-radius: 12px; text-align: center; font-size: 0.9rem; color: #7f8c8d; cursor: pointer; }
        .bank-option-fancy.selected { border-color: var(--danger); color: var(--danger); font-weight: bold; background: #fff5f5; }

        .size-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .size-btn { padding: 10px 2px; border: 1px solid #eee; border-radius: 12px; background: #f9f9f9; color: #7f8c8d; cursor: pointer; font-size: 0.85rem; text-align: center; }
        .size-btn.active { background: #3498db; color: white; border-color: #3498db; font-weight: bold; }

        .footer-credit {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.4);
            color: rgba(255, 255, 255, 0.8);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            z-index: 999;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<header>
    <h1>💰 消費獎賞助手</h1>
    <button class="settings-btn" onclick="toggleModal('bankModal', true)">⚙️</button>
</header>

<div class="container" id="mainContainer"></div>

<div class="footer-credit">via by AndyLCK and Gemini</div>

<div class="modal" id="bankModal">
    <div class="modal-content">
        <h3 style="text-align:center; margin-top:0; font-size: 1.3rem; margin-bottom: 10px;">系統設定</h3>
        <div class="setting-section-title">字體大小設定</div>
        <div class="size-selector">
            <div class="size-btn" id="size-12" onclick="updateFontSize(12)">小字</div>
            <div class="size-btn" id="size-16" onclick="updateFontSize(16)">適中</div>
            <div class="size-btn" id="size-18" onclick="updateFontSize(18)">大字</div>
        </div>
        <div class="setting-section-title">管理銀行 (共 8 間)</div>
        <div id="bankSelector" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:25px;"></div>
        <button class="btn-save-fancy" onclick="toggleModal('bankModal', false)">儲存並返回</button>
        <button class="btn-reset-fancy" onclick="weeklyReset()"><span>🔄</span> 開始新的一週</button>
    </div>
</div>

<div class="modal" id="addCouponModal">
    <div class="modal-content">
        <h3 style="text-align:center; margin-top:0; font-size: 1.2rem;">記錄 - <span id="targetBankName"></span></h3>
        <div class="amount-grid">
            <button class="amount-btn" onclick="selectAmount(10)">$10</button>
            <button class="amount-btn" onclick="selectAmount(20)">$20</button>
            <button class="amount-btn" onclick="selectAmount(50)">$50</button>
            <button class="amount-btn" onclick="selectAmount(100)">$100</button>
            <button class="amount-btn" onclick="selectAmount(200)">$200</button>
        </div>
        <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin-bottom:20px;">
            <button style="width:40px;height:40px;border-radius:50%;border:none;background:#eee;font-size:1.5rem;" onclick="changeQty(-1)">−</button>
            <span id="displayQty" style="font-size:1.5rem;font-weight:bold;width:40px;text-align:center;">1</span>
            <button style="width:40px;height:40px;border-radius:50%;border:none;background:#eee;font-size:1.5rem;" onclick="changeQty(1)">+</button>
        </div>
        <button class="btn-save-fancy" style="background:var(--success)" onclick="confirmAddCoupon()">確認新增</button>
        <button style="background:none;border:none;width:100%;margin-top:10px;color:#999;font-size:0.9rem;" onclick="toggleModal('addCouponModal', false)">取消</button>
    </div>
</div>

<script>
    // 更新為指定的 8 間銀行及對應名稱
    const logoMap = {
        "支付寶 (AliPay)": "https://cdn.worldvectorlogo.com/logos/alipay-square-.svg", // 螞蟻銀行
        "中銀 (BOC)": "https://companieslogo.com/img/orig/2588.HK-042b21f7.png?t=1729834878", 
        "廣發 (CBG)": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRxl4_Phd8GEGFDShs-ASDKseW6V-qR72F0AQ&s",
        "工銀 (ICBC)": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTVaxU2DorJK5bDIzToHcJTBhX05--f1HFk9A&s",
        "國際 (Luso)": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSUJU2ByM7L4igXAeyw45eOLTFFN-RF0L40BA&s",
        "Mpay": "https://play-lh.googleusercontent.com/UKRuhn1YEqCZQWMsJ841cFzjQTkbtuRsbW3xUW-QR5df21CcR90iJtVQJ4tMCNWxElV6", // 澳門通
        "大豐 (Tai Fung)": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT3klf0NlYKbwo7IwRd_x6JFyofEkUr0qlZlA&s",
        "UEPay": "https://play-lh.googleusercontent.com/4hTscHjq6HmxkcybIlOsq2jR4xs6YyNL18vOM5DBbhcaK8fM2OvCPxyaLEfK4y-4dK9k" // 極易付
    };

    const allBanks = Object.keys(logoMap);
    let userData = JSON.parse(localStorage.getItem('macau_v10')) || { myBanks: [], drawStatus: {}, coupons: [], fontSize: 16 };
    let tempAdd = { bank: '', amount: 10, qty: 1 };

    function saveData() { localStorage.setItem('macau_v10', JSON.stringify(userData)); render(); }
    
    function updateFontSize(size) {
        userData.fontSize = size;
        document.documentElement.style.setProperty('--base-size', size + 'px');
        document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`size-${size}`);
        if(activeBtn) activeBtn.classList.add('active');
        saveData();
    }

    function toggleModal(id, show) {
        document.getElementById(id).style.display = show ? 'block' : 'none';
        if(id === 'bankModal' && show) {
            initBankSelector();
            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('active'));
            const currentSizeBtn = document.getElementById(`size-${userData.fontSize}`);
            if(currentSizeBtn) currentSizeBtn.classList.add('active');
        }
    }

    function initBankSelector() {
        const container = document.getElementById('bankSelector');
        container.innerHTML = '';
        allBanks.forEach(bank => {
            const isSelected = userData.myBanks.includes(bank);
            const div = document.createElement('div');
            div.className = `bank-option-fancy ${isSelected ? 'selected' : ''}`;
            div.innerText = bank;
            div.onclick = () => {
                userData.myBanks = isSelected ? userData.myBanks.filter(b => b !== bank) : [...userData.myBanks, bank];
                initBankSelector(); saveData();
            };
            container.appendChild(div);
        });
    }

    function openAddModal(bank) {
        tempAdd = { bank, amount: 10, qty: 1 };
        document.getElementById('targetBankName').innerText = bank;
        document.getElementById('displayQty').innerText = '1';
        selectAmount(10); toggleModal('addCouponModal', true);
    }

    function selectAmount(amt) {
        tempAdd.amount = amt;
        document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === `$${amt}`));
    }

    function changeQty(diff) {
        tempAdd.qty = Math.max(1, tempAdd.qty + diff);
        document.getElementById('displayQty').innerText = tempAdd.qty;
    }

    function confirmAddCoupon() {
        for(let i=0; i<tempAdd.qty; i++) {
            userData.coupons.push({ id: Date.now().toString()+i, bank: tempAdd.bank, amount: tempAdd.amount, used: false });
        }
        saveData(); toggleModal('addCouponModal', false);
    }

    function render() {
        document.documentElement.style.setProperty('--base-size', userData.fontSize + 'px');
        const container = document.getElementById('mainContainer');
        container.innerHTML = '';
        if(userData.myBanks.length === 0) {
            container.innerHTML = `<div style="text-align:center; color:#bbb; margin-top:80px; font-size:1.1rem;">請點擊 ⚙️ 設定銀行</div>`;
            return;
        }
        userData.myBanks.forEach(bank => {
            const isDrawn = userData.drawStatus[bank] || false;
            const bankCoupons = userData.coupons.filter(c => c.bank === bank);
            const imgSrc = logoMap[bank] || ""; 
            const card = document.createElement('div');
            card.className = 'bank-card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="bank-header-left">
                        <img src="${imgSrc}" class="bank-logo" alt="">
                        <span style="font-weight:bold; font-size:1.1rem;">${bank}</span>
                        <span class="status-pill ${isDrawn ? 'done' : 'pending'}">${isDrawn ? '已抽' : '未抽'}</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" ${isDrawn ? 'checked' : ''} onchange="toggleDraw('${bank}')">
                        <span class="slider"></span>
                    </label>
                </div>
                <div style="padding: 12px 15px 5px 15px;">
                    ${bankCoupons.map(c => `
                        <div class="coupon-wrapper ${c.used ? 'used' : ''} amt-${c.amount}">
                            <div class="check-box-zone" onclick="toggleCoupon('${c.id}')">
                                <div class="check-circle">✓</div>
                            </div>
                            <span class="dashed-line"></span>
                            <span class="btn-delete" onclick="deleteCoupon('${c.id}')">🗑️</span>
                            <div class="coupon-info">
                                <div>
                                    <h4>${bank} 獎賞</h4>
                                    <p>有效日期參考 App</p>
                                </div>
                                <p style="font-weight:bold; color:#666;">滿 ${c.amount * 3} 使用</p>
                            </div>
                            <div class="coupon-amt-box">
                                <span class="currency">MOP</span>
                                <span class="amount">${c.amount}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <button class="btn-add" onclick="openAddModal('${bank}')">+ 記錄獎賞</button>
            `;
            container.appendChild(card);
        });
    }

    function toggleDraw(bank) { userData.drawStatus[bank] = !userData.drawStatus[bank]; saveData(); }
    function toggleCoupon(id) { 
        const c = userData.coupons.find(c => c.id === id); 
        if(c){ c.used = !c.used; saveData(); } 
    }
    function deleteCoupon(id) { if(confirm('刪除記錄？')){ userData.coupons = userData.coupons.filter(c => c.id !== id); saveData(); } }
    function weeklyReset() { if(confirm('⚠️ 確定重置本週資料嗎？')){ userData.drawStatus={}; userData.coupons=[]; saveData(); toggleModal('bankModal', false); } }
    
    render();
</script>

</body>
</html>
